output_dir: /root/autodl-tmp/CODE-GRPO/trl/runs_codegrpo
report_to:
  - tensorboard
logging_steps: 1
save_strategy: "steps"
save_steps: 20
save_total_limit: 2
eval_strategy: "steps"
eval_steps: 20
push_to_hub: false

use_cpu: false
bf16: true
fp16: false

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-Coder-7B-Instruct
load_in_4bit: true
use_peft: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

dataset_adapter: default
datasets:
  - path: json
    data_files: /root/autodl-tmp/CODE-GRPO/trl/mini_codegrpo_7b_smoke.jsonl
    split: train
test_split_size: 0.5

codegrpo_mode: train
backend: vllm
use_vllm: true
vllm_mode: colocate
vllm_tensor_parallel_size: 1
vllm_gpu_memory_utilization: 0.35

num_train_epochs: 1
max_steps: 40
learning_rate: 1.0e-6
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
gradient_checkpointing: true
gradient_accumulation_steps: 2
per_device_train_batch_size: 1
per_device_eval_batch_size: 2
max_completion_length: 256

K: 2
K_reason: 4
num_generations: 2
num_generations_eval: 2
T_max: 2
N_max: 12
M_audit: 2
M_retry: 1
context_round_window: 2
lambda_soft: 0.2
beta_reason: 1.0
gamma_shrink: 0.1
error_max_chars: 300
error_max_lines: 10
code_timeout_seconds: 2.0
eval_round_n: 1
eval_k_list: [1, 2]

dump_train_traces: true
debug_trace_dir: traces/rollout
debug_trace_sample_size: 1
debug_trace_question_ids: []
