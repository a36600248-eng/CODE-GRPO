output_dir: /root/autodl-tmp/CODE-GRPO/trl/runs_pure_grpo_server_2gpu_mixed500
report_to: tensorboard
tensorboard_root_dir: /root/tf-logs/CODE-GRPO-PURE-GRPO-SERVER-2GPU-MIXED500
logging_steps: 5
disable_tqdm: true
save_strategy: "no"
eval_strategy: "steps"
eval_steps: 100
push_to_hub: false
seed: 42
data_seed: 42
max_train_samples: 400
max_eval_samples: 20
run_base_model_baseline_eval: false
eval_repeat_count: 1

use_cpu: false
bf16: true
fp16: false

model_name_or_path: /root/autodl-tmp/models/Qwen2.5-Coder-7B-Instruct
load_in_4bit: false
use_peft: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

dataset_adapter: default
datasets:
  - path: json
    data_files:
      train: /root/autodl-tmp/CODE-GRPO/trl/data/code_rl_mixed_small_500/train.jsonl
      test: /root/autodl-tmp/CODE-GRPO/trl/data/code_rl_mixed_small_500/validation.jsonl

codegrpo_mode: train
backend: vllm
use_vllm: true
vllm_mode: server
vllm_server_base_url: http://127.0.0.1:8000
vllm_server_timeout: 600.0
vllm_sync_steps: 5
async_rollout_prefetch: true

num_train_epochs: 1
max_steps: 800
learning_rate: 1.0e-6
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
beta: 0.001
gradient_checkpointing: true
gradient_accumulation_steps: 1
generation_batch_size: 16
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
max_completion_length: 256
max_completion_length_code: 256
generation_temperature_code: 0.7
eval_generation_temperature_code: 0.0
generation_top_p_code: 0.95
generation_min_new_tokens_code: 16
generation_empty_retry_count: 1
generation_outside_noise_chars: 0
code_timeout_seconds: 2.0

K: 8
num_generations: 8
num_generations_eval: 1
T_max: 1
eval_T_max_override: 1
N_max: 8
M_retry: 0
context_round_window: 1
eval_round_n: 1
eval_k_list: [1]
eval_code_only_single_trajectory: true
reward_window_bins: 4
advantage_base: R_code
advantage_mode: mean_only
code_grpo_loss_type: token_mean

zero_pass_soft_reward_enabled: false
zero_pass_soft_reward_diag_count: 4
zero_pass_soft_reward_clip_low: -2.0
zero_pass_soft_reward_clip_high: 2.0
zero_pass_soft_reward_beta_scale: 0.5
code_io_aux_training_enabled: false
question_prior_enabled: false

dump_train_traces: true
trace_store_full_text: false
dump_eval_traces: false
log_eval_trajectories: false
log_train_rollout_details: false
write_trainer_text_log: false
log_trace_dump_events: false
debug_trace_dir: traces/rollout
debug_trace_sample_size: 1
dump_train_trace_interval_steps: 100
max_train_trace_files: 4
review_bundle_trace_sample_size: 2
